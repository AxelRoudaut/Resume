<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Binary Forensic Pipeline</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #1b1f28;
    color: #e8eaed;
  }
  .diagram-card {
    padding: 16px;
  }
  .diagram-card svg {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
  <div class="diagram-card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 100 1700 520" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="mFlow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0 0 L9 4 L0 8 Z" fill="#1E88E5"/>
    </marker>
    <marker id="mWrite" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0 0 L9 4 L0 8 Z" fill="#34D399"/>
    </marker>
    <marker id="mRead" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0 0 L9 4 L0 8 Z" fill="#4fd1c5"/>
    </marker>
  </defs>

  <rect width="1700" height="700" fill="#1b1f28"/>
  <!-- ===== eyebrow workflow labels ===== -->
  <text x="385" y="128" font-size="12" font-weight="700" fill="#1B7FB8" text-anchor="middle" letter-spacing="1">1 &#183; EXTRACTION</text>
  <text x="745" y="128" font-size="12" font-weight="700" fill="#93A5B4" text-anchor="middle" letter-spacing="1">2 &#183; FORENSICS</text>
  <text x="1105" y="128" font-size="12" font-weight="700" fill="#D9660F" text-anchor="middle" letter-spacing="1">3 &#183; ANALYSIS</text>

  <!-- ================= VM DISK (input) ================= -->
  <rect x="40" y="150" width="175" height="155" rx="12" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="7 5"/>
  <g transform="translate(127,196)">
    <ellipse cx="0" cy="-8" rx="26" ry="9" fill="#fff" stroke="#93A5B4" stroke-width="2"/>
    <path d="M-26 -8 v20 a26 9 0 0 0 52 0 v-20" fill="#fff" stroke="#93A5B4" stroke-width="2"/>
    <ellipse cx="0" cy="2" rx="26" ry="9" fill="none" stroke="#93A5B4" stroke-width="1.4"/>
    <!-- windows mark -->
    <g transform="translate(-13,-11)"><rect width="5" height="5" fill="#00ADEF"/><rect x="6" width="5" height="5" fill="#00ADEF"/><rect y="6" width="5" height="5" fill="#00ADEF"/><rect x="6" y="6" width="5" height="5" fill="#00ADEF"/></g>
    <!-- debian swirl -->
    <path d="M13 -13 a6 6 0 1 0 5 8" fill="none" stroke="#A80030" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="127" y="258" font-size="15" font-weight="700" fill="#e8eaed" text-anchor="middle">VM Disk Image</text>
  <text x="127" y="279" font-size="11.5" fill="#9aa0a8" text-anchor="middle">Windows &#38; Debian</text>
  <text x="127" y="295" font-size="11.5" fill="#9aa0a8" text-anchor="middle">(mounted read-only)</text>

  <!-- ================= PYTHON EXTRACTOR ================= -->
  <rect x="290" y="150" width="190" height="155" rx="12" fill="#1b1f28" stroke="#3776AB" stroke-width="2.5"/>
   cx="385" cy="196" r="28" fill="#1b1f28" stroke="#3776AB" stroke-width="2"/>
  <g transform="translate(385,196)">
    <rect x="-16" y="-17" width="24" height="22" rx="8" fill="#366F9E"/>
    <rect x="-8" y="-4" width="24" height="22" rx="8" fill="#FFD140"/>
    <circle cx="-10" cy="-11" r="2.4" fill="#fff"/>
    <circle cx="10" cy="12" r="2.4" fill="#fff"/>
  </g>
  <text x="385" y="252" font-size="15" font-weight="700" fill="#e8eaed" text-anchor="middle">Python Extractor</text>
  <text x="385" y="273" font-size="11.5" fill="#9aa0a8" text-anchor="middle">Mount disk, pull all</text>
  <text x="385" y="289" font-size="11.5" fill="#9aa0a8" text-anchor="middle">binaries &#38; libraries</text>

  <!-- ================= FORENSIC WORKER ================= -->
  <rect x="650" y="150" width="190" height="155" rx="12" fill="#1b1f28" stroke="#93A5B4" stroke-width="2.5"/>
   cx="745" cy="196" r="28" fill="#1b1f28" stroke="#93A5B4" stroke-width="2"/>
  <g transform="translate(745,196)">
    <text x="-14" y="-2" font-size="9" font-weight="700" fill="#90A4AE" font-family="monospace">01</text>
    <text x="-16" y="9" font-size="9" font-weight="700" fill="#90A4AE" font-family="monospace">10</text>
    <circle cx="6" cy="-4" r="9" fill="none" stroke="#93A5B4" stroke-width="2.5"/>
    <line x1="12.5" y1="2.5" x2="19" y2="9" stroke="#93A5B4" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="745" y="252" font-size="15" font-weight="700" fill="#e8eaed" text-anchor="middle">Forensic Worker</text>
  <text x="745" y="273" font-size="11.5" fill="#9aa0a8" text-anchor="middle">Analyze binaries,</text>
  <text x="745" y="289" font-size="11.5" fill="#9aa0a8" text-anchor="middle">extract artifacts</text>

  <!-- ================= JUPYTER ================= -->
  <rect x="1010" y="150" width="190" height="155" rx="12" fill="#1b1f28" stroke="#F37726" stroke-width="2.5"/>
   cx="1105" cy="196" r="28" fill="#1b1f28" stroke="#F37726" stroke-width="2"/>
  <g transform="translate(1105,196)" fill="#F37726">
    <circle cx="0" cy="6" r="6.5"/>
    <circle cx="-11" cy="-6" r="4"/>
    <circle cx="11" cy="-6" r="4"/>
    <circle cx="0" cy="-13" r="3"/>
  </g>
  <text x="1105" y="252" font-size="15" font-weight="700" fill="#e8eaed" text-anchor="middle">Jupyter Notebook</text>
  <text x="1105" y="273" font-size="11.5" fill="#9aa0a8" text-anchor="middle">Explore results,</text>
  <text x="1105" y="289" font-size="11.5" fill="#9aa0a8" text-anchor="middle">build graphs</text>

  <!-- ================= SHARED STORAGE ================= -->
  <rect x="255" y="420" width="620" height="180" rx="14" fill="#20242e" stroke="#3a4150" stroke-width="2"/>
  <text x="278" y="450" font-size="13" font-weight="700" fill="#93A5B4" letter-spacing="1">SHARED STORAGE</text>

  <!-- MinIO -->
  <rect x="300" y="462" width="175" height="118" rx="12" fill="#1b1f28" stroke="#C4293D" stroke-width="2.5"/>
   cx="387" cy="500" r="24" fill="#1b1f28" stroke="#C4293D" stroke-width="2"/>
  <path d="M377 507 Q383 493 387 501 Q391 493 397 507 Q391 503 387 508 Q383 503 377 507 Z" fill="#C4293D"/>
  <text x="387" y="545" font-size="15" font-weight="700" fill="#e8eaed" text-anchor="middle">MinIO</text>
  <text x="387" y="565" font-size="11.5" fill="#9aa0a8" text-anchor="middle">Object store &#183; files</text>

  <!-- PostgreSQL -->
  <rect x="640" y="462" width="175" height="118" rx="12" fill="#1b1f28" stroke="#336791" stroke-width="2.5"/>
  <g transform="translate(727,500)">
    <circle cx="0" cy="-2" r="10" fill="#336791"/>
    <circle cx="-6" cy="-7" r="4.5" fill="#336791"/>
    <path d="M3 5 q5 4 1 10" fill="none" stroke="#336791" stroke-width="4" stroke-linecap="round"/>
    <circle cx="4" cy="-4" r="1.7" fill="#fff"/>
  </g>
  <text x="727" y="545" font-size="15" font-weight="700" fill="#e8eaed" text-anchor="middle">PostgreSQL</text>
  <text x="727" y="565" font-size="11.5" fill="#9aa0a8" text-anchor="middle">Metadata &#183; results</text>

  <!-- ================= ARROWS ================= -->
  <!-- pipeline (blue) -->
  <line x1="215" y1="227" x2="284" y2="227" stroke="#1E88E5" stroke-width="2.5" marker-end="url(#mFlow)"/>
  <line x1="480" y1="227" x2="644" y2="227" stroke="#1E88E5" stroke-width="2.5" marker-end="url(#mFlow)"/>
  <line x1="840" y1="227" x2="1004" y2="227" stroke="#1E88E5" stroke-width="2.5" marker-end="url(#mFlow)"/>

  <!-- writes (green) -->
  <line x1="385" y1="305" x2="387" y2="456" stroke="#34D399" stroke-width="2.2" marker-end="url(#mWrite)"/>
  <text x="360" y="385" font-size="11" fill="#34D399" text-anchor="end">binaries + libs</text>

  <path d="M430 305 C 520 405, 640 400, 705 456" fill="none" stroke="#34D399" stroke-width="2.2" marker-end="url(#mWrite)"/>
  <text x="560" y="392" font-size="11" fill="#34D399" text-anchor="middle">paths + IDs</text>

  <line x1="745" y1="305" x2="732" y2="456" stroke="#34D399" stroke-width="2.2" marker-end="url(#mWrite)"/>
  <text x="770" y="385" font-size="11" fill="#34D399" text-anchor="start">forensic results</text>

  <!-- reads (teal dashed) -->
  <path d="M475 490 C 560 430, 640 360, 700 312" fill="none" stroke="#4fd1c5" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#mRead)"/>
  <text x="640" y="430" font-size="11" fill="#4fd1c5" text-anchor="middle">read binaries</text>

  <path d="M815 500 C 905 470, 918 360, 1050 310" fill="none" stroke="#4fd1c5" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#mRead)"/>
  <text x="892" y="405" font-size="11" fill="#4fd1c5" text-anchor="middle">read results</text>

  <!-- ================= LEGEND ================= -->
  <rect x="960" y="420" width="700" height="180" rx="14" fill="#20242e" stroke="#3a4150" stroke-width="1.5"/>
  <text x="983" y="450" font-size="13" font-weight="700" fill="#c7cbd1" letter-spacing="1">LEGEND</text>

  <line x1="985" y1="483" x2="1035" y2="483" stroke="#1E88E5" stroke-width="2.5" marker-end="url(#mFlow)"/>
  <text x="1048" y="488" font-size="12.5" fill="#c7cbd1">Pipeline flow (stage to stage)</text>

  <line x1="985" y1="519" x2="1035" y2="519" stroke="#34D399" stroke-width="2.5" marker-end="url(#mWrite)"/>
  <text x="1048" y="524" font-size="12.5" fill="#c7cbd1">Write to storage</text>

  <line x1="985" y1="555" x2="1035" y2="555" stroke="#4fd1c5" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#mRead)"/>
  <text x="1048" y="560" font-size="12.5" fill="#c7cbd1">Read from storage</text>

  <rect x="1355" y="474" width="30" height="18" rx="5" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="1397" y="488" font-size="12.5" fill="#c7cbd1">External input</text>

  <rect x="1355" y="510" width="30" height="18" rx="5" fill="#20242e" stroke="#3a4150" stroke-width="2"/>
  <text x="1397" y="524" font-size="12.5" fill="#c7cbd1">Shared storage layer</text>

  <text x="1355" y="562" font-size="12.5" fill="#c7cbd1">1 / 2 / 3 &#8195;Workflow order</text>
</svg>
  </div>
</body>
</html>
