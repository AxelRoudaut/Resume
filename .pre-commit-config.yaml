repos:
  # Basic checks
  - repo: https://github.com/pre-commit/pre-commit-hooks.git
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: debug-statements
        language_version: python3
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: fix-byte-order-marker
      - id: check-executables-have-shebangs
      - id: pretty-format-json
        args:
          - --no-sort-keys
          - --autofix
          - --no-ensure-ascii

  # Conventional Commits enforcement
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, ci, revert, perf, build]

  # Python lint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args:
          - --fix
          - --exit-non-zero-on-fix
        types_or: [python, pyi]
      - id: ruff-format # must be after ruff
        types_or: [python, pyi]

  # Language check
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell

  # Web lint (HTML via djlint, JS + CSS via Biome) — see justfile `init` for install
  - repo: local
    hooks:
      - id: djlint
        name: djlint (HTML)
        entry: uv run djlint --lint
        language: system
        types: [html]
        exclude: ^images/
      - id: biome
        name: biome (JS/CSS lint)
        entry: biome lint --no-errors-on-unmatched
        language: system
        files: \.(js|css)$
        exclude: ^images/
